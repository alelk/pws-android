name: Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.4.0-rc.3)'
        required: true
        type: string
      flavor_ru:
        description: 'Build ru flavor (Google Play RU)'
        required: false
        type: boolean
        default: false
      flavor_uk:
        description: 'Build uk flavor (Google Play UK)'
        required: false
        type: boolean
        default: false
      flavor_rustore:
        description: 'Build rustore flavor (RuStore)'
        required: false
        type: boolean
        default: false
      release_title:
        description: 'Release title (optional, defaults to tag name)'
        required: false
        type: string

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ── Validation ────────────────────────────────────────────────────────
      - name: Validate — at least one flavor selected
        run: |
          if [[ "${{ inputs.flavor_ru }}" != "true" && \
                "${{ inputs.flavor_uk }}" != "true" && \
                "${{ inputs.flavor_rustore }}" != "true" ]]; then
            echo "::error::At least one flavor must be selected (flavor_ru, flavor_uk, or flavor_rustore)."
            exit 1
          fi

      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout ${{ inputs.tag }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      # Ensure build tooling scripts come from the dispatching branch, not the tag.
      # This prevents stale helper scripts in old tags from breaking the build.
      - name: Restore build scripts from dispatching branch
        run: |
          git fetch origin
          git checkout origin/${{ github.ref_name }} -- fetch-db.sh

      # ── Java + Gradle cache ───────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'jetbrains'
          cache: gradle

      # ── Keystores ────────────────────────────────────────────────────────
      - name: Decode keystore — ru / uk
        if: ${{ inputs.flavor_ru || inputs.flavor_uk }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.jks

      - name: Decode keystore — rustore
        if: ${{ inputs.flavor_rustore }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_RUSTORE_BASE64 }}" | base64 --decode > /tmp/rustore.jks

      # ── Fetch DB assets ───────────────────────────────────────────────────────
      # GH_TOKEN must be a PAT with 'Contents: Read' on the private alelk/pws-docs repo.
      # Store the PAT as secret PWS_DOCS_TOKEN in this repository's settings.
      #
      # DB_DECRYPT_KEY_PROD — prod decryption key for *.dbz.enc release assets.
      # Store as secret DB_DECRYPT_KEY_PROD in this repository's settings.
      # Debug key is public and embedded in source code (BuildConfig.DB_DECRYPT_KEY).
      - name: Fetch DB — ru
        if: ${{ inputs.flavor_ru }}
        env:
          GH_TOKEN: ${{ secrets.PWS_DOCS_TOKEN }}
        run: ./fetch-db.sh ruRelease

      - name: Fetch DB — uk
        if: ${{ inputs.flavor_uk }}
        env:
          GH_TOKEN: ${{ secrets.PWS_DOCS_TOKEN }}
        run: ./fetch-db.sh ukRelease

      - name: Fetch DB — rustore
        if: ${{ inputs.flavor_rustore }}
        env:
          GH_TOKEN: ${{ secrets.PWS_DOCS_TOKEN }}
        run: ./fetch-db.sh rustoreRelease

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build ru Release
        if: ${{ inputs.flavor_ru }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DB_DECRYPT_KEY_PROD: ${{ secrets.DB_DECRYPT_KEY_PROD }}
        run: |
          ./gradlew :app-compose:assembleRuRelease :app-compose:bundleRuRelease \
            -Pandroid.release.keystorePath=/tmp/release.jks \
            -Pandroid.release.storePassword="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -Pandroid.release.keyAliasRu="pws" \
            -Pandroid.release.keyPassword="${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Build uk Release
        if: ${{ inputs.flavor_uk }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DB_DECRYPT_KEY_PROD: ${{ secrets.DB_DECRYPT_KEY_PROD }}
        run: |
          ./gradlew :app-compose:assembleUkRelease :app-compose:bundleUkRelease \
            -Pandroid.release.keystorePath=/tmp/release.jks \
            -Pandroid.release.storePassword="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -Pandroid.release.keyAliasUk="pws-uk" \
            -Pandroid.release.keyPassword="${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Build rustore Release
        if: ${{ inputs.flavor_rustore }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DB_DECRYPT_KEY_PROD: ${{ secrets.DB_DECRYPT_KEY_PROD }}
        run: |
          ./gradlew :app-compose:assembleRustoreRelease :app-compose:bundleRustoreRelease \
            -Pandroid.release.keystorePathRustore=/tmp/rustore.jks \
            -Pandroid.release.storePasswordRustore="${{ secrets.RELEASE_STORE_PASSWORD_RUSTORE }}" \
            -Pandroid.release.keyAliasRuRustore="pws" \
            -Pandroid.release.keyPasswordRustore="${{ secrets.RELEASE_KEY_PASSWORD_RUSTORE }}"

      # ── Collect & rename artifacts ────────────────────────────────────────
      - name: Collect artifacts
        run: |
          mkdir -p output/release
          TAG="${{ inputs.tag }}"
          if [[ "${{ inputs.flavor_ru }}" == "true" ]]; then
            cp app-compose/build/outputs/apk/ru/release/app-compose-ru-release.apk \
               "output/release/pws-app-${TAG}-ru.apk"
            cp app-compose/build/outputs/bundle/ruRelease/app-compose-ru-release.aab \
               "output/release/pws-app-${TAG}-ru.aab"
          fi
          if [[ "${{ inputs.flavor_uk }}" == "true" ]]; then
            cp app-compose/build/outputs/apk/uk/release/app-compose-uk-release.apk \
               "output/release/pws-app-${TAG}-uk.apk"
            cp app-compose/build/outputs/bundle/ukRelease/app-compose-uk-release.aab \
               "output/release/pws-app-${TAG}-uk.aab"
          fi
          if [[ "${{ inputs.flavor_rustore }}" == "true" ]]; then
            cp app-compose/build/outputs/apk/rustore/release/app-compose-rustore-release.apk \
               "output/release/pws-app-${TAG}-rustore.apk"
            cp app-compose/build/outputs/bundle/rustoreRelease/app-compose-rustore-release.aab \
               "output/release/pws-app-${TAG}-rustore.aab"
          fi
          echo "Artifacts ready:"
          ls -lh output/release/

      # ── E2E tests ─────────────────────────────────────────────────────────
      # TODO: re-enable when E2E infrastructure is ready (requires macOS runner for emulator)
      - name: E2E — ru
        if: ${{ inputs.flavor_ru }}
        run: echo "::notice::E2E tests are temporarily disabled."

      - name: E2E — uk
        if: ${{ inputs.flavor_uk }}
        run: echo "::notice::E2E tests are temporarily disabled."

      - name: E2E — rustore
        if: ${{ inputs.flavor_rustore }}
        run: echo "::notice::E2E tests are temporarily disabled."

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="${{ inputs.release_title }}"
          if [[ -z "$TITLE" ]]; then
            TITLE="${{ inputs.tag }}"
          fi
          gh release create "${{ inputs.tag }}" \
            --title "$TITLE" \
            --verify-tag \
            output/release/*
          echo "✅ Release '$TITLE' created: https://github.com/${{ github.repository }}/releases/tag/${{ inputs.tag }}"
