appId: ${APP_ID}
name: "12 - Remove from favorites and verify empty"
---
# Mutation: add → verify in Favorites → remove → verify gone.

- runFlow: _helpers/cold-start.yaml

# --- Step 1: add to favorites ---
- runFlow: _helpers/open-song-1-via-search.yaml
- tapOn:
    id: "${ACTION_TOGGLE_FAVORITE}"

# --- Step 2: verify song appears in Favorites tab ---
# Two back: one may be consumed by a transient Snackbar (UNDO toast after toggle).
- back
- back

- extendedWaitUntil:
    visible:
      id: "${NAV_FAVORITES}"
    timeout: ${TIMEOUT_MEDIUM}

- tapOn:
    id: "${NAV_FAVORITES}"

- extendedWaitUntil:
    visible:
      id: "${SONG_ITEM_ONE}"
    timeout: ${TIMEOUT_MEDIUM}

- assertVisible:
    id: "${SONG_ITEM_ONE}"

# --- Step 3: open the song from Favorites and remove favorite ---
- tapOn:
    id: "${SONG_ITEM_ONE}"

- extendedWaitUntil:
    visible:
      id: "${ACTION_TOGGLE_FAVORITE}"
    timeout: ${TIMEOUT_LONG}

- tapOn:
    id: "${ACTION_TOGGLE_FAVORITE}"

# --- Step 4: back to Favorites tab and verify item gone ---
- back
- back

- extendedWaitUntil:
    visible:
      id: "${NAV_FAVORITES}"
    timeout: ${TIMEOUT_MEDIUM}

- tapOn:
    id: "${NAV_FAVORITES}"

- waitForAnimationToEnd
- takeScreenshot: "12-favorites-after-remove"

- assertNotVisible:
    id: "${SONG_ITEM_ONE}"
