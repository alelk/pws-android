appId: ${APP_ID}
name: "11 - Home: number search modal opens song"
---
# Open NumberInputModal via quick-action chip, type number, tap suggestion, open song.

- launchApp:
    clearState: false

- tapOn:
    id: "${NAV_HOME}"

- extendedWaitUntil:
    visible:
      id: "${ACTION_NUMBER_SEARCH}"
    timeout: ${TIMEOUT_LONG}

- tapOn:
    id: "${ACTION_NUMBER_SEARCH}"

- extendedWaitUntil:
    visible:
      id: "${FIELD_NUMBER_INPUT}"
    timeout: ${TIMEOUT_MEDIUM}

- tapOn:
    id: "${FIELD_NUMBER_INPUT}"
- inputText: "${SEARCH_QUERY_NUMERIC}"

- extendedWaitUntil:
    visible:
      id: "${NUMBER_SUGGESTION_ZERO}"
    timeout: ${TIMEOUT_MEDIUM}

- tapOn:
    id: "${NUMBER_SUGGESTION_ZERO}"

- extendedWaitUntil:
    visible:
      id: "${ACTION_TOGGLE_FAVORITE}"
    timeout: ${TIMEOUT_LONG}

- assertVisible:
    id: "${ACTION_TOGGLE_FAVORITE}"

- takeScreenshot: "11-song-opened-via-number"
