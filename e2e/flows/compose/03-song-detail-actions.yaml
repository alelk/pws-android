appId: ${APP_ID}
name: "03 - Song detail - actions sheet visible"
---
# Smoke: open song-1, open more-actions sheet, verify Edit / Edit-tags items.

- launchApp:
    clearState: false

- runFlow: _helpers/open-song-1-via-search.yaml

- tapOn:
    id: "${ACTION_MORE}"

- extendedWaitUntil:
    visible:
      id: "${ACTION_EDIT_SONG}"
    timeout: ${TIMEOUT_MEDIUM}

- assertVisible:
    id: "${ACTION_EDIT_SONG}"
- assertVisible:
    id: "${ACTION_EDIT_TAGS}"

- takeScreenshot: "03-actions-sheet"
