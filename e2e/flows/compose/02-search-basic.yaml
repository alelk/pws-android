appId: ${APP_ID}
name: "02 - Basic search returns results and opens song"
---
# Smoke: search by numeric query opens song-1 detail.
# Uses shared subflow open-song-1-via-search.yaml.

- launchApp:
    clearState: false

- waitForAnimationToEnd

- runFlow: _helpers/open-song-1-via-search.yaml

- assertVisible:
    id: "${ACTION_TOGGLE_FAVORITE}"

- takeScreenshot: "02-song-detail-opened"
