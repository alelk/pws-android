appId: ${APP_ID}
name: "06 - Create tag and assign to song"
---
# Mutation: create tag TEST_TAG_NAME, assign to song #1, verify chip visible.

- runFlow: _helpers/cold-start.yaml

- runFlow: _helpers/create-tag.yaml

- runFlow: _helpers/assign-tag-to-song-1.yaml

# Tag chip should be visible on the song detail screen (may need scroll).
- scrollUntilVisible:
    element: "${TEST_TAG_NAME}"
    direction: DOWN
    timeout: ${TIMEOUT_MEDIUM}

- assertVisible: "${TEST_TAG_NAME}"

- takeScreenshot: "06-tag-assigned-on-song"
