appId: ${APP_ID}
name: "10 - Settings screen opens and closes"
---
# Navigates to History tab (known screen with Settings icon),
# opens Settings via stable testTag, verifies no crash, returns back.

- launchApp:
    clearState: false

- tapOn:
    id: "${NAV_HISTORY}"

- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "${ACTION_OPEN_SETTINGS}"
    timeout: 10000

- tapOn:
    id: "${ACTION_OPEN_SETTINGS}"

- waitForAnimationToEnd
- takeScreenshot: "10-settings-opened"

# Settings loaded — verify the screen is visible (back button implies navigation occurred)
# and navigate back to previous screen.
- back

- extendedWaitUntil:
    visible:
      id: "${NAV_HISTORY}"
    timeout: 10000

- assertVisible:
    id: "${NAV_HISTORY}"

- takeScreenshot: "10-settings-back"

