appId: ${APP_ID}
name: "10 - Settings screen opens and closes"
---
# Open Settings via History tab → back → assert History reachable.

- launchApp:
    clearState: false

- tapOn:
    id: "${NAV_HISTORY}"

- extendedWaitUntil:
    visible:
      id: "${ACTION_OPEN_SETTINGS}"
    timeout: ${TIMEOUT_MEDIUM}

- tapOn:
    id: "${ACTION_OPEN_SETTINGS}"

# Settings is a separate screen; no stable testTag exists there yet,
# so we wait for the transition to settle and then assert we can get back.
- waitForAnimationToEnd

- back

- extendedWaitUntil:
    visible:
      id: "${NAV_HISTORY}"
    timeout: ${TIMEOUT_MEDIUM}

- assertVisible:
    id: "${NAV_HISTORY}"

- takeScreenshot: "10-settings-back"
