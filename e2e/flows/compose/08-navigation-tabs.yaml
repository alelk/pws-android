appId: ${APP_ID}
name: "08 - Navigation tabs - all tabs reachable"
---
# Visits every bottom-nav tab in sequence and asserts each loads.
# 100% locale-independent: navigation by contentDescription = route.

- launchApp:
    clearState: false

# Search tab
- tapOn:
    id: "${NAV_SEARCH}"
- extendedWaitUntil:
    visible:
      id: "${FIELD_SEARCH}"
    timeout: ${TIMEOUT_MEDIUM}
- hideKeyboard

# Books tab
- tapOn:
    id: "${NAV_BOOKS}"
- extendedWaitUntil:
    visible:
      id: "books-grid"
    timeout: ${TIMEOUT_LONG}

# Tags tab
- tapOn:
    id: "${NAV_TAGS}"
- extendedWaitUntil:
    visible:
      id: "${ACTION_ADD_TAG}"
    timeout: ${TIMEOUT_MEDIUM}

# Favorites tab
- tapOn:
    id: "${NAV_FAVORITES}"
- waitForAnimationToEnd

# History tab
- tapOn:
    id: "${NAV_HISTORY}"
- waitForAnimationToEnd

# Back to Home
- tapOn:
    id: "${NAV_HOME}"
- extendedWaitUntil:
    visible:
      id: "${NAV_HOME}"
    timeout: ${TIMEOUT_MEDIUM}

- takeScreenshot: "08-tab-home"
