appId: ${APP_ID}
name: "16 - Home: recently viewed section appears after opening song"
---
# Smoke (effective mutation): open a song to populate "recently viewed",
# scroll Home → "Recently Viewed" section, tap first recent card,
# verify SongDetailScreen.

- launchApp:
    clearState: false

- runFlow: _helpers/populate-history.yaml

- tapOn:
    id: "${NAV_HOME}"

- scrollUntilVisible:
    element:
      id: "${HOME_SECTION_RECENTLY_VIEWED}"
    direction: DOWN
    timeout: ${TIMEOUT_MEDIUM}

- scrollUntilVisible:
    element:
      id: "${RECENT_SONG_CARD_ZERO}"
    direction: DOWN
    timeout: ${TIMEOUT_SHORT}

- tapOn:
    id: "${RECENT_SONG_CARD_ZERO}"

- extendedWaitUntil:
    visible:
      id: "${ACTION_TOGGLE_FAVORITE}"
    timeout: ${TIMEOUT_LONG}

- assertVisible:
    id: "${ACTION_TOGGLE_FAVORITE}"

- takeScreenshot: "16-song-opened-from-recent"
