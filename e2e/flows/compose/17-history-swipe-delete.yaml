appId: ${APP_ID}
name: "17 - History: swipe to delete a single entry (diagnostic)"
---
# DIAGNOSTIC FLOW — may be flaky on emulators due to Maestro swipe precision.
# Run separately; NOT included in suite-full.yaml by default.
#
# Opens a song, navigates to History, swipes left on the first item to delete it,
# and verifies the item is no longer visible.

- launchApp:
    clearState: false

# Ensure history is populated
- tapOn:
    id: "${NAV_SEARCH}"

- extendedWaitUntil:
    visible:
      id: "${FIELD_SEARCH}"
    timeout: 10000

- tapOn:
    id: "${FIELD_SEARCH}"
- inputText: "${SEARCH_QUERY_NUMERIC}"
- pressKey: Enter
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "${SONG_ITEM_ONE}"
    timeout: 15000

- tapOn:
    id: "${SONG_ITEM_ONE}"

- extendedWaitUntil:
    visible:
      id: "${ACTION_TOGGLE_FAVORITE}"
    timeout: 15000

- waitForAnimationToEnd
- waitForAnimationToEnd

- back
- back
- waitForAnimationToEnd

# Navigate to History
- tapOn:
    id: "${NAV_HISTORY}"

- extendedWaitUntil:
    visible:
      id: "${SONG_ITEM_ONE}"
    timeout: 15000

- takeScreenshot: "17-history-before-swipe"

# Swipe left on the first song item to trigger delete
- swipe:
    direction: LEFT
    duration: 400
    from:
      id: "${SONG_ITEM_ONE}"

- waitForAnimationToEnd
- takeScreenshot: "17-after-swipe"

# If app shows a delete button/action on swipe — it may require a second tap.
# If item is removed by swipe directly — verify it's gone.
# Using optional tap on any delete confirmation.
- tapOn:
    id: "icon:delete"
    optional: true

- waitForAnimationToEnd
- takeScreenshot: "17-after-delete"

