appId: ${APP_ID}
name: "01 - App launch and navigation ready"
---
# Verify the app starts without crash and all navigation tabs are reachable.

- launchApp:
    clearState: false

- extendedWaitUntil:
    visible:
      id: "${NAV_HOME}"
    timeout: ${TIMEOUT_COLD_START}

- assertVisible:
    id: "${NAV_HOME}"
- assertVisible:
    id: "${NAV_SEARCH}"
- assertVisible:
    id: "${NAV_BOOKS}"
- assertVisible:
    id: "${NAV_TAGS}"
- assertVisible:
    id: "${NAV_FAVORITES}"
- assertVisible:
    id: "${NAV_HISTORY}"

- takeScreenshot: "01-app-launch-home"
