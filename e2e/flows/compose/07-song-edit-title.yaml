appId: ${APP_ID}
name: "07 - Edit song title and verify"
---
# Mutation: edit song #1's title to TEST_SONG_EDIT_TITLE, save, assert in top bar.
# Relies on clearState:true (via cold-start helper) for isolation — the modified
# title persists in the app DB, but the next flow restarts with cleared state.

- runFlow: _helpers/cold-start.yaml

- runFlow: _helpers/open-song-1-via-search.yaml

- tapOn:
    id: "${ACTION_MORE}"

- extendedWaitUntil:
    visible:
      id: "${ACTION_EDIT_SONG}"
    timeout: ${TIMEOUT_MEDIUM}

- tapOn:
    id: "${ACTION_EDIT_SONG}"

- extendedWaitUntil:
    visible:
      id: "${FIELD_SONG_EDIT_TITLE}"
    timeout: ${TIMEOUT_MEDIUM}

# tapOn places cursor at tap point (center); two eraseText passes clear
# both left and remaining characters around the cursor.
- tapOn:
    id: "${FIELD_SONG_EDIT_TITLE}"
- eraseText: 50
- tapOn:
    id: "${FIELD_SONG_EDIT_TITLE}"
- eraseText: 50

- inputText: "${TEST_SONG_EDIT_TITLE}"
- hideKeyboard

- tapOn:
    id: "${ACTION_SAVE}"

# Back on song detail screen — favorite FAB is the marker.
- extendedWaitUntil:
    visible:
      id: "${ACTION_TOGGLE_FAVORITE}"
    timeout: ${TIMEOUT_LONG}

- assertVisible: "${TEST_SONG_EDIT_TITLE}"

- takeScreenshot: "07-song-title-updated"
