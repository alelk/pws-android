appId: ${APP_ID}
name: "14 - History: clear all entries"
---
# Mutation: open a song to populate history → open History tab →
# assert non-empty BEFORE clear → Clear All → confirm → assert empty.

- runFlow: _helpers/cold-start.yaml

- runFlow: _helpers/populate-history.yaml

- tapOn:
    id: "${NAV_HISTORY}"

- extendedWaitUntil:
    visible:
      id: "${ACTION_CLEAR_HISTORY}"
    timeout: ${TIMEOUT_LONG}

# Strengthen the test: history MUST contain the song before clearing,
# otherwise the final assertNotVisible would pass for the wrong reason.
- assertVisible:
    id: "${SONG_ITEM_ONE}"

- tapOn:
    id: "${ACTION_CLEAR_HISTORY}"

# Confirm dialog (testTagsAsResourceId applied on confirm button).
- extendedWaitUntil:
    visible:
      id: "${ACTION_CONFIRM_CLEAR_HISTORY}"
    timeout: ${TIMEOUT_MEDIUM}

- tapOn:
    id: "${ACTION_CONFIRM_CLEAR_HISTORY}"

# Dialog dismisses → list re-renders empty.
- extendedWaitUntil:
    notVisible:
      id: "${ACTION_CONFIRM_CLEAR_HISTORY}"
    timeout: ${TIMEOUT_SHORT}

- takeScreenshot: "14-after-clear"

- assertNotVisible:
    id: "${SONG_ITEM_ONE}"
