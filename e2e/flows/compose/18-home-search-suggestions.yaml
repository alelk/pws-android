appId: ${APP_ID}
name: "18 - Home: inline search suggestions appear and navigate to song"
---
# Type in the HomeScreen inline SearchBarWithSuggestions, wait for suggestion,
# tap it, verify SongDetailScreen.

- launchApp:
    clearState: false

- tapOn:
    id: "${NAV_HOME}"

- extendedWaitUntil:
    visible:
      id: "${FIELD_HOME_SEARCH}"
    timeout: ${TIMEOUT_LONG}

- tapOn:
    id: "${FIELD_HOME_SEARCH}"
- inputText: "${SEARCH_QUERY_NUMERIC}"

- extendedWaitUntil:
    visible:
      id: "${HOME_SUGGESTION_ZERO}"
    timeout: ${TIMEOUT_MEDIUM}

- tapOn:
    id: "${HOME_SUGGESTION_ZERO}"

- extendedWaitUntil:
    visible:
      id: "${ACTION_TOGGLE_FAVORITE}"
    timeout: ${TIMEOUT_LONG}

- assertVisible:
    id: "${ACTION_TOGGLE_FAVORITE}"

- takeScreenshot: "18-song-opened-from-home-suggestion"
