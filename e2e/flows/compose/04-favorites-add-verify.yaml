appId: ${APP_ID}
name: "04 - Add to favorites and verify in Favorites list"
---
# Mutation: add song #1 to favorites, navigate to Favorites tab, assert visible.

- runFlow: _helpers/cold-start.yaml

- runFlow: _helpers/open-song-1-via-search.yaml

# Add to favorites.
- tapOn:
    id: "${ACTION_TOGGLE_FAVORITE}"

- back
- back
- tapOn:
    id: "${NAV_FAVORITES}"

- extendedWaitUntil:
    visible:
      id: "${SONG_ITEM_ONE}"
    timeout: ${TIMEOUT_LONG}

- assertVisible:
    id: "${SONG_ITEM_ONE}"

- takeScreenshot: "04-favorites-list"
