appId: ${APP_ID}
name: "05 - History recorded after opening song"
---
# Mutation: open song #1, dwell past HistoryRecorder threshold, navigate to
# History tab, assert song appears and is tappable.

- runFlow: _helpers/cold-start.yaml

- runFlow: _helpers/populate-history.yaml

- tapOn:
    id: "${NAV_HISTORY}"

- extendedWaitUntil:
    visible:
      id: "${SONG_ITEM_ONE}"
    timeout: ${TIMEOUT_MEDIUM}

- tapOn:
    id: "${SONG_ITEM_ONE}"

# Verify navigation to song detail from history.
- extendedWaitUntil:
    visible:
      id: "${ACTION_TOGGLE_FAVORITE}"
    timeout: ${TIMEOUT_LONG}

- assertVisible:
    id: "${ACTION_TOGGLE_FAVORITE}"

- takeScreenshot: "05-history-list"
