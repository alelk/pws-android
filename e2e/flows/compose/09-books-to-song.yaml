appId: ${APP_ID}
name: "09 - Books tab - navigate to a song via book song list"
---
# Smoke: open Books tab → tap first book card → open first song.

- launchApp:
    clearState: false

- tapOn:
    id: "${NAV_BOOKS}"

- extendedWaitUntil:
    visible:
      id: "books-grid"
    timeout: ${TIMEOUT_LONG}

- extendedWaitUntil:
    visible:
      id: "book-card-0"
    timeout: ${TIMEOUT_MEDIUM}

- tapOn:
    id: "book-card-0"

- extendedWaitUntil:
    visible:
      id: "${SONG_ITEM_ONE}"
    timeout: ${TIMEOUT_LONG}

- tapOn:
    id: "${SONG_ITEM_ONE}"

- extendedWaitUntil:
    visible:
      id: "${ACTION_TOGGLE_FAVORITE}"
    timeout: ${TIMEOUT_LONG}

- assertVisible:
    id: "${ACTION_TOGGLE_FAVORITE}"

- takeScreenshot: "09-song-opened-from-book"
