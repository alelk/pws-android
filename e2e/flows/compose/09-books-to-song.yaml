appId: ${APP_ID}
name: "09 - Books tab - navigate to a song via book song list"
---
# Opens the Books tab, taps the first available book,
# verifies song list loads, then opens the first song from the list.

- launchApp:
    clearState: false

- tapOn:
    id: "${NAV_BOOKS}"

- waitForAnimationToEnd
- takeScreenshot: "09-books-tab-loaded"

# Wait for books grid to become visible (stable contentDescription set on LazyVerticalGrid).
- extendedWaitUntil:
    visible:
      id: "books-grid"
    timeout: 15000

# Tap the first book card (contentDescription = "book-card-<name>").
# Use point-based tap on first card: grid starts below TopAppBar.
- tapOn:
    point: "25%,30%"

- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: "09-book-songs-list"

# Wait for any song row to appear (contentDescription = "song-row-N").
- extendedWaitUntil:
    visible:
      id: "${SONG_ITEM_ONE}"
    timeout: 20000

# Tap the first song row via its stable contentDescription (set on SongListItem Surface).
- tapOn:
    id: "${SONG_ITEM_ONE}"

- extendedWaitUntil:
    visible:
      id: "${ACTION_TOGGLE_FAVORITE}"
    timeout: 15000

- assertVisible:
    id: "${ACTION_TOGGLE_FAVORITE}"

- takeScreenshot: "09-song-opened-from-book"


