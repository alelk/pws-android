appId: ${APP_ID}
name: "15 - Search: empty results state"
---
# Submit a query that returns zero results; verify no crash and empty list.

- launchApp:
    clearState: false

- tapOn:
    id: "${NAV_SEARCH}"

- extendedWaitUntil:
    visible:
      id: "${FIELD_SEARCH}"
    timeout: ${TIMEOUT_MEDIUM}

- tapOn:
    id: "${FIELD_SEARCH}"
- inputText: "zzz999"
- pressKey: Enter
- hideKeyboard

- waitForAnimationToEnd

- assertNotVisible:
    id: "${SONG_ITEM_ONE}"

- takeScreenshot: "15-empty-results"
