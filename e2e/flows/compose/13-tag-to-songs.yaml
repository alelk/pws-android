appId: ${APP_ID}
name: "13 - Tag tap navigates to TagSongsScreen"
---
# Mutation: create tag, assign to song #1, tap tag row in Tags tab,
# verify TagSongsScreen loads with at least one song row.

- runFlow: _helpers/cold-start.yaml

- runFlow: _helpers/create-tag.yaml

- runFlow: _helpers/assign-tag-to-song-1.yaml

# Navigate to Tags tab and tap the tag row.
- back
- back
- tapOn:
    id: "${NAV_TAGS}"

- extendedWaitUntil:
    visible:
      id: "${ACTION_ADD_TAG}"
    timeout: ${TIMEOUT_MEDIUM}

- scrollUntilVisible:
    element: "${TEST_TAG_NAME}"
    direction: DOWN
    timeout: ${TIMEOUT_LONG}

# Tap tag row (testTag = "tag-row-${TEST_TAG_NAME}").
- tapOn:
    id: "tag-row-${TEST_TAG_NAME}"

# TagSongsScreen should load with the song row.
- extendedWaitUntil:
    visible:
      id: "${SONG_ITEM_ONE}"
    timeout: ${TIMEOUT_LONG}

- assertVisible:
    id: "${SONG_ITEM_ONE}"

- takeScreenshot: "13-tag-songs-list"
